name: "Terraform"

on:
   #workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install node_modules into the function directory before Terraform runs.
      # Terraform Cloud runners don't have npm — the build must happen in CI.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install Lambda dependencies
        run: npm install --prefix modules/lambda@edge/function --omit=dev --no-fund --no-audit

      # Upgraded to v3 to fix "set-output" deprecation warnings
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # 1. Auto-format files
      - name: Terraform Format
        run: terraform fmt -recursive

      # 2. Verify formatting
      - name: Verify Format
        run: terraform fmt -check

      # 3. Initialize
      - name: Terraform Init
        run: terraform init

      # 4. Validate syntax
      - name: Terraform Validate
        run: terraform validate

      # 5. Generate execution plan
      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}

      # 6. Apply (Only on push to main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}